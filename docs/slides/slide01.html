<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0D1520; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  background: #1C2833;
}
.top-bar {
  position: absolute; top: 0; left: 0; width: 720pt; height: 4pt;
  background: #2E86AB;
}
.center-block {
  margin-top: 20pt;
  text-align: center;
}
.logo-text {
  color: #2E86AB; font-size: 48pt; font-weight: bold;
  margin: 0 0 8pt 0;
  letter-spacing: 3pt;
}
.subtitle {
  color: #FFFFFF; font-size: 18pt; font-weight: normal;
  margin: 0 0 40pt 0;
}
.divider {
  width: 60pt; height: 2pt; background: #2E86AB;
  margin: 0 auto 40pt auto;
}
.company {
  color: #8899AA; font-size: 12pt;
  margin: 0;
}
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="center-block">
  <h1 class="logo-text">ELUO SYS</h1>
  <p class="subtitle">On-Premise AI Agency Platform</p>
  <div class="divider"></div>
  <p class="company">ELUO C&amp;C  |  2026.03</p>
</div>
</body>
</html>
