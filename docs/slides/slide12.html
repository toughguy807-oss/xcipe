<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0D1520; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  background: #1C2833;
}
.top-bar {
  position: absolute; top: 0; left: 0; width: 720pt; height: 4pt;
  background: #2E86AB;
}
.center-block {
  text-align: center;
}
.qa-title {
  color: #FFFFFF; font-size: 40pt; font-weight: bold;
  margin: 0 0 8pt 0;
}
.qa-sub {
  color: #8899AA; font-size: 14pt;
  margin: 0 0 30pt 0;
}
.divider {
  width: 60pt; height: 2pt; background: #2E86AB;
  margin: 0 auto 30pt auto;
}
.contact-line {
  color: #AABBCC; font-size: 11pt;
  margin: 0 0 6pt 0;
}
.company-line {
  color: #556677; font-size: 10pt;
  margin: 20pt 0 0 0;
}
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="center-block">
  <h1 class="qa-title">Q &amp; A</h1>
  <p class="qa-sub">Thank you for your attention</p>
  <div class="divider"></div>
  <p class="contact-line">ELUO C&amp;C | On-Premise AI Agency Platform</p>
  <p class="contact-line">eluo.co.kr</p>
  <p class="company-line">ELUO SYS 2026</p>
</div>
</body>
</html>
